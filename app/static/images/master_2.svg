<svg xmlns="http://www.w3.org/2000/svg" width="400" height="430" viewBox="0 0 400 430">
  <rect width="400" height="430" fill="#d7e6ec"/>
  <!-- Body / uniform -->
  <rect x="110" y="260" width="180" height="170" rx="12" fill="#0b5c8f"/>
  <!-- Head -->
  <circle cx="200" cy="200" r="72" fill="#f5cba7"/>
  <!-- Hair -->
  <ellipse cx="200" cy="138" rx="72" ry="38" fill="#1a1a1a"/>
  <!-- Collar -->
  <polygon points="170,260 200,300 230,260" fill="#0e9cbd"/>
  <!-- Name badge area -->
  <rect x="140" y="310" width="120" height="36" rx="8" fill="rgba(255,255,255,0.18)"/>
  <text x="200" y="333" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="white">Артём</text>
  <!-- Snowflake icon on uniform -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.55)">❄</text>
</svg>
